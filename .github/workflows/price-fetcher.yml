name: Price fetcher

on:
  schedule:
    # 09:30 UTC = 16:30 ICT — after HOSE/HNX close (15:00 ICT), daily on trading weekdays.
    - cron: "30 9 * * 1-5"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: jobs/price-fetcher

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: jobs/price-fetcher/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price fetcher
        run: python main.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
