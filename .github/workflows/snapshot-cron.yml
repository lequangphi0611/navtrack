name: Snapshot cron

on:
  schedule:
    # 00:00 UTC on the 1st of every month — fires once for PERIODIC (previous
    # month end) and, in January only, also YEAR_END (previous Dec 31).
    # Change this cron expression to switch to a weekly cadence (see
    # jobs/snapshot-cron/main.py "Xác định mốc cần chốt" comment).
    - cron: "0 0 1 * *"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: jobs/snapshot-cron

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: jobs/snapshot-cron/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run snapshot cron
        run: python main.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
